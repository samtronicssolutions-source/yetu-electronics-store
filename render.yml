services:
  # Web service
  - type: web
    name: yetu-ecommerce
    env: php
    buildCommand: |
      composer install
      php database/migrate.php
    startCommand: apache2-foreground
    envVars:
      - key: APP_ENV
        value: production
      - key: SITE_URL
        fromService:
          type: web
          name: yetu-ecommerce
          property: host
      - key: DATABASE_URL
        fromDatabase:
          name: yetu-db
          property: connectionString
      - key: MPESA_CONSUMER_KEY
        sync: false
      - key: MPESA_CONSUMER_SECRET
        sync: false
      - key: MPESA_PASSKEY
        sync: false

  # Database service (PostgreSQL)
  - type: pgsql
    name: yetu-db
    plan: free
    ipAllowList: []
    databaseName: yetu_db
    postgresMajorVersion: 15
